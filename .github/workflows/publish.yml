name: Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11

      - name: Print tool versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Detect release metadata
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=dev" >> "$GITHUB_OUTPUT"
            echo "gh_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "gh_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish prerelease to npm
        if: steps.release.outputs.is_prerelease == 'true'
        run: npm publish --tag "${{ steps.release.outputs.npm_tag }}"

      - name: Publish stable release to npm
        if: steps.release.outputs.is_prerelease == 'false'
        run: npm publish

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ steps.release.outputs.gh_prerelease }}" == "true" ]]; then
            gh release create "${GITHUB_REF_NAME}" --generate-notes --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          fi
